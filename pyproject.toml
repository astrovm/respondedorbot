[tool.ruff]
target-version = "py314"
line-length = 100

[tool.ruff.lint]
select = ["E", "F", "W", "I", "B", "UP", "SIM", "S", "RUF", "PLE", "PLW"]
ignore = [
    "B023",
    "B905",
    "E501",
    "S101",
    "S106",
    "S110",
    "S112",
    "S307",
    "S314",
    "S311",
    "S501",
    "S603",
    "S607",
    "S608",
    "UP006",
    "UP007",
    "UP035",
    "UP045",
    "UP047",
    "RUF001",
    "RUF005",
    "RUF012",
    "RUF013",
    "RUF022",
    "B007",
    "B011",
    "SIM102",
    "SIM103",
    "SIM105",
    "SIM108",
    "SIM114",
    "SIM117",
    "I001",
    "PLW0603",
]

[tool.ruff.lint.per-file-ignores]
"api/index.py" = ["F401"]
"tests/**" = ["E712", "F403", "F405", "F841", "RUF059", "RUF100", "PLW0108"]

[tool.mypy]
python_version = "3.14"
ignore_missing_imports = true
check_untyped_defs = true
no_implicit_optional = true
warn_redundant_casts = true
warn_unused_ignores = true
warn_return_any = false
strict_optional = true
disallow_untyped_defs = false
disallow_incomplete_defs = false

[[tool.mypy.overrides]]
module = [
    "api.index",
    "api.message_handler",
    "api.ai_billing",
    "api.provider_runtime",
    "api.services.bcra",
    "api.services.maintenance",
    "api.agent_tools",
    "api.utils.youtube_transcript",
]
ignore_errors = true
