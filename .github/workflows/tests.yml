name: Tests

on:
  push:
    branches:
      - main
      - master
  pull_request:

jobs:
  checks:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          version: "0.11.20"
          enable-cache: true

      - name: Install dependencies
        run: uv sync --locked

      - name: Lint with ruff
        run: uv run --locked ruff check api/ tests/

      - name: Type check with mypy
        run: uv run --locked mypy api/

      - name: Run test suite
        run: uv run --locked python -m pytest -q
