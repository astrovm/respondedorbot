name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  checks:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up uv
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          version-file: pyproject.toml
          enable-cache: true

      - name: Install dependencies
        run: uv sync --locked

      - name: Lint with ruff
        run: uv run --locked ruff check api/ tests/

      - name: Type check with mypy
        run: uv run --locked mypy api/

      - name: Run test suite
        run: uv run --locked python -m pytest -q

  build-and-push:
    needs: checks
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Log in to GHCR
        if: github.event_name == 'push'
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | podman login ghcr.io \
            --username "${{ github.actor }}" \
            --password-stdin

      - name: Build image
        run: |
          REPO="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}"
          TAG_FLAGS="--tag ${REPO}:sha-${{ github.sha }}"
          if [ "${{ github.event_name }}" = "push" ]; then
            TAG_FLAGS="${TAG_FLAGS} --tag ${REPO}:latest"
          fi
          podman build \
            ${TAG_FLAGS} \
            --label "org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}" \
            --label "org.opencontainers.image.revision=${{ github.sha }}" \
            --label "org.opencontainers.image.created=$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            .

      - name: Push image
        if: github.event_name != 'pull_request'
        run: |
          REPO="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}"
          podman push "${REPO}:sha-${{ github.sha }}"
          podman push "${REPO}:latest"
