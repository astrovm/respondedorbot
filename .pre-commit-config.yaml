repos:
  - repo: local
    hooks:
      - id: ruff
        name: ruff
        entry: uv run --locked ruff check
        language: system
        types: [python]
        args: [--fix, --exit-non-zero-on-fix]

      - id: mypy
        name: mypy
        entry: uv run --locked mypy
        language: system
        types: [python]
        pass_filenames: false
        args: [api/]

      - id: pytest
        name: pytest
        entry: uv run --locked python -m pytest -q
        language: system
        types: [python]
        pass_filenames: false
