services:
  bot:
    build: .
    container_name: respondedorbot
    env_file:
      - .env
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    depends_on:
      - redis
    restart: unless-stopped
    networks:
      - bot-network

  redis:
    image: redis:7-alpine
    container_name: respondedorbot-redis
    restart: unless-stopped
    networks:
      - bot-network
    volumes:
      - redis-data:/data

networks:
  bot-network:
    driver: bridge

volumes:
  redis-data:
